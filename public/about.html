<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><title>О клинике</title><link rel="stylesheet" href="style.css"><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet"></head>
<body>
<div class="header">...</div>
<main>
    <div class="container">
        <h1 class="page-title">О клинике</h1>
        <div class="about-content">
            <div class="about-text">
                <h2 class="about-heading" id="aboutWhoTitle">Кто мы</h2>
                <p class="about-paragraph" id="aboutWhoText"></p>
                <h2 class="about-heading">Наша миссия</h2>
                <p class="about-paragraph" id="aboutMissionText"></p>
                <h2 class="about-heading">Почему выбирают нас</h2>
                <ul class="about-list" id="aboutWhyList"></ul>
                <h2 class="about-heading">Наша история</h2>
                <p class="about-paragraph" id="aboutHistoryText"></p>
            </div>
        </div>
        <div class="gallery-section"><h2 class="about-heading" style="text-align:center;">Фотогалерея</h2><div class="gallery-grid" id="aboutGalleryGrid"></div></div>
        <div class="team-section"><h2 class="about-heading" style="text-align:center;">Наша команда</h2><div class="doctors-grid" id="aboutDoctorsGrid"></div></div>
    </div>
</main>
<div class="footer">...</div>
<div id="modal-form" class="modal-form">...</div>
<script src="main.js"></script>
<script>
    async function loadAbout() {
        const s = await (await fetch('/api/settings')).json();
        document.getElementById('aboutWhoText').innerText = s.about_who || '';
        document.getElementById('aboutMissionText').innerText = s.about_mission || '';
        document.getElementById('aboutHistoryText').innerText = s.about_history || '';
        const whyList = s.about_why_list ? s.about_why_list.split('|').map(item => `<li>${item.trim()}</li>`).join('') : '<li>Индивидуальный подход</li><li>Сертифицированные препараты</li>';
        document.getElementById('aboutWhyList').innerHTML = whyList;
        const gallery = await (await fetch('/api/gallery')).json();
        const galleryGrid = document.getElementById('aboutGalleryGrid');
        if (galleryGrid && gallery.length) galleryGrid.innerHTML = gallery.map(img => `<div class="gallery-item"><img src="${img.image}" onerror="this.src='https://via.placeholder.com/300x250'"></div>`).join('');
        const doctors = await (await fetch('/api/doctors')).json();
        const doctorsGrid = document.getElementById('aboutDoctorsGrid');
        if (doctorsGrid && doctors.length) doctorsGrid.innerHTML = doctors.map(d => `<div class="team-card"><div class="team-photo">👩‍⚕️</div><h3 class="team-name">${escapeHtml(d.name)}</h3><p class="team-position">${escapeHtml(d.position || '')}</p><p class="team-desc">${escapeHtml(d.description || '')}</p></div>`).join('');
    }
    document.addEventListener('DOMContentLoaded', loadAbout);
</script>
</body>
</html>
