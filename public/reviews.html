<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><title>Отзывы</title><link rel="stylesheet" href="style.css"><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet"></head>
<body>
<div class="header">...</div>
<main><div class="container"><h1 class="page-title">Отзывы клиентов</h1><div class="reviews-grid" id="reviewsGrid"></div></div></main>
<div class="footer">...</div>
<div id="modal-form" class="modal-form">...</div>
<script src="main.js"></script>
<script>
    async function loadReviewsPage() {
        const res = await fetch('/api/reviews');
        const reviews = await res.json();
        const grid = document.getElementById('reviewsGrid');
        if (grid && reviews.length) {
            grid.innerHTML = reviews.map(r => `<div class="review-card"><div class="review-text">«${escapeHtml(r.text)}»</div><div class="review-author">${escapeHtml(r.author)}</div>${r.rating ? `<div>⭐ ${r.rating}/5</div>` : ''}</div>`).join('');
        } else grid.innerHTML = '<p>Отзывы скоро появятся</p>';
    }
    document.addEventListener('DOMContentLoaded', loadReviewsPage);
</script>
</body>
</html>
