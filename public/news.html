<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><title>Новости</title><link rel="stylesheet" href="style.css"><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet"></head>
<body>
<div class="header">...</div>
<main><div class="container"><h1 class="page-title">Новости клиники</h1><div id="allNewsContainer" class="news-grid"></div></div></main>
<div class="footer">...</div>
<div id="modal-form" class="modal-form">...</div>
<script src="main.js"></script>
<script>
    async function loadAllNews() {
        const res = await fetch('/api/news');
        const news = await res.json();
        const container = document.getElementById('allNewsContainer');
        if (container && news.length) {
            container.innerHTML = news.map(n => `<div class="news-item"><h3 class="news-title">${escapeHtml(n.title)}</h3><div class="news-date">${new Date(n.created_at).toLocaleDateString('ru-RU')}</div><div class="news-content">${escapeHtml(n.content)}</div></div>`).join('');
        } else container.innerHTML = '<p>Новостей пока нет</p>';
    }
    document.addEventListener('DOMContentLoaded', loadAllNews);
</script>
</body>
</html>
