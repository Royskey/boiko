<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Наши врачи</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="header">...</div> <!-- скопировать шапку из index.html -->
<main>
    <div class="container">
        <h1 class="page-title">Наши врачи</h1>
        <div class="doctors-grid" id="doctorsGrid"></div>
    </div>
</main>
<div class="footer">...</div>
<div id="modal-form" class="modal-form">...</div>
<script src="main.js"></script>
<script>
    async function loadDoctorsPage() {
        const res = await fetch('/api/doctors');
        const doctors = await res.json();
        const grid = document.getElementById('doctorsGrid');
        if (grid && doctors.length) {
            grid.innerHTML = doctors.map(d => `
                <div class="doctor-card">
                    <div class="doctor-photo">👩‍⚕️</div>
                    <div class="doctor-name">${escapeHtml(d.name)}</div>
                    <div class="doctor-position">${escapeHtml(d.position || '')}</div>
                    <div class="doctor-desc">${escapeHtml(d.description || '')}</div>
                    ${d.experience ? `<div class="doctor-diploma">📜 ${escapeHtml(d.experience)}</div>` : ''}
                </div>
            `).join('');
        } else grid.innerHTML = '<p>Информация о врачах скоро появится</p>';
    }
    document.addEventListener('DOMContentLoaded', loadDoctorsPage);
</script>
</body>
</html>
