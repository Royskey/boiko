<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в админ-панель</title>
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #FDFCFA; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 28px; width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 30px; border: 1px solid #E0DCD6; }
        button { background: #C7A07A; color: white; padding: 12px; border: none; border-radius: 30px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
<div class="login-card">
    <h2>Вход в админ-панель</h2>
    <input type="text" id="username" placeholder="Логин" value="admin">
    <input type="password" id="password" placeholder="Пароль">
    <button onclick="login()">Войти</button>
    <div id="error" style="color:red; margin-top:10px;"></div>
</div>
<script>
    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('adminToken', data.token);
            window.location.href = 'index.html';
        } else {
            document.getElementById('error').innerText = data.error || 'Ошибка';
        }
    }
    if (localStorage.getItem('adminToken')) window.location.href = 'index.html';
</script>
</body>
</html>
