<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Косметология</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .edit-card input, .edit-card textarea { width: 100%; margin-bottom: 10px; padding: 8px; border-radius: 12px; border: 1px solid #E0DCD6; }
        .edit-card-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .image-preview img { max-width: 100px; border-radius: 8px; margin-top: 5px; }
        .btn-add, .btn-save, .btn-delete { cursor: pointer; padding: 6px 12px; border-radius: 20px; border: none; }
        .btn-add { background: #C7A07A; color: white; }
        .btn-save { background: #5cb85c; color: white; }
        .btn-delete { background: #d9534f; color: white; }
        .gallery-grid-admin { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 15px; }
        .gallery-item-admin { background: white; border-radius: 16px; padding: 10px; text-align: center; border: 1px solid #F0EDE8; }
        .gallery-item-admin img { width: 100%; height: 120px; object-fit: cover; border-radius: 12px; }
        .admin-layout { display: flex; }
        .admin-sidebar { width: 260px; background: #FFF; border-right: 1px solid #F0EDE8; padding: 20px; }
        .admin-nav-item { display: block; padding: 12px; margin: 5px 0; color: #2E2E2E; text-decoration: none; border-radius: 12px; }
        .admin-nav-item.active, .admin-nav-item:hover { background: #F5F2EF; color: #C7A07A; }
        .admin-content { flex: 1; padding: 30px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; text-align: center; flex: 1; }
        .stat-number { font-size: 28px; font-weight: bold; color: #C7A07A; }
        .admin-table { width: 100%; border-collapse: collapse; background: white; }
        .admin-table th, .admin-table td { padding: 12px; border-bottom: 1px solid #F0EDE8; text-align: left; }
        .calendar-weekdays { display: grid; grid-template-columns: repeat(7,1fr); text-align: center; font-weight: bold; margin: 10px 0; }
        .calendar-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 8px; }
        .calendar-day { background: white; border: 1px solid #F0EDE8; border-radius: 12px; padding: 12px; text-align: center; cursor: pointer; }
        .calendar-day.has-appointments { background: #FFF8F0; border-color: #C7A07A; }
        .appointment-badge { background: #C7A07A; color: white; border-radius: 20px; padding: 2px 6px; font-size: 11px; margin-left: 5px; }
                /* Стили для страницы настроек */
            <style>
        ... (остальные стили)
        /* Стили для страницы настроек */
        #settings-form label {
            font-weight: 500;
            display: block;
            margin-bottom: 8px;
        }
        #settings-form input[type="text"],
        #settings-form textarea,
        #settings-form select {
            width: 100%;
            padding: 10px;
            border: 1px solid #E0DCD6;
            border-radius: 16px;
            margin-top: 5px;
            font-family: 'Montserrat', sans-serif;
        }
        #settings-form textarea {
            min-height: 80px;
        }
        #settings-form input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            vertical-align: middle;
        }
</style>
</head>
<body>
<div class="admin-layout">
    <div class="admin-sidebar">
        <div class="admin-logo" style="font-family: 'Playfair Display'; font-size: 22px; margin-bottom: 30px;">Косметология <span style="color:#C7A07A;">by Boiko</span></div>
        <div class="admin-nav">
            <a href="#" class="admin-nav-item active" data-tab="applications">📋 Заявки</a>
            <a href="#" class="admin-nav-item" data-tab="calendar">📅 Календарь</a>
            <a href="#" class="admin-nav-item" data-tab="services">💎 Услуги</a>
            <a href="#" class="admin-nav-item" data-tab="reviews">⭐ Отзывы</a>
            <a href="#" class="admin-nav-item" data-tab="doctors">👨‍⚕️ Врачи</a>
            <a href="#" class="admin-nav-item" data-tab="gallery">🖼️ Галерея</a>
            <a href="#" class="admin-nav-item" data-tab="news">📰 Новости</a>
            <a href="#" class="admin-nav-item" data-tab="settings">⚙️ Настройки</a>
        </div>
    </div>
    <div class="admin-content">
        <div class="admin-header" style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h1>Панель управления</h1>
            <a href="#" class="logout-btn" onclick="logout()" style="background:#2E2E2E; color:white; padding:8px 20px; border-radius:30px;">Выйти</a>
        </div>
        <div class="stats" id="stats"></div>

        <!-- Заявки -->
        <div id="applications-tab" class="tab-content active">
            <table class="admin-table" id="applications-table">
                <thead><tr><th>ID</th><th>Дата</th><th>Имя</th><th>Телефон</th><th>Услуга</th><th>Статус</th><th>Действия</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Календарь -->
        <div id="calendar-tab" class="tab-content">
            <input type="month" id="calendar-month" style="padding:8px;">
            <button class="btn-save" onclick="loadCalendar()">Показать</button>
            <div id="calendar-grid"></div>
            <div id="calendar-appointments" style="margin-top:30px;"><h3>Заявки на выбранный день</h3><div id="day-appointments"></div></div>
        </div>

        <!-- Услуги -->
        <div id="services-tab" class="tab-content">
            <button class="btn-add" onclick="addService()">➕ Добавить услугу</button>
            <div id="services-list"></div>
        </div>

        <!-- Отзывы -->
        <div id="reviews-tab" class="tab-content">
            <button class="btn-add" onclick="addReview()">➕ Добавить отзыв</button>
            <div id="reviews-list"></div>
        </div>

        <!-- Врачи -->
        <div id="doctors-tab" class="tab-content">
            <button class="btn-add" onclick="addDoctor()">➕ Добавить врача</button>
            <div id="doctors-list"></div>
        </div>

        <!-- Галерея -->
        <div id="gallery-tab" class="tab-content">
            <button class="btn-add" onclick="addGalleryItem()">➕ Добавить фото</button>
            <div id="gallery-list" class="gallery-grid-admin"></div>
        </div>

        <!-- Новости -->
        <div id="news-tab" class="tab-content">
            <button class="btn-add" onclick="addNews()">➕ Добавить новость</button>
            <div id="news-list"></div>
        </div>

        <!-- Настройки -->
        <div id="settings-tab" class="tab-content">
            <div class="edit-card"><h3>Общие настройки</h3><div id="settings-form"></div><button class="btn-save" onclick="saveAllSettings()">Сохранить всё</button></div>
        </div>
    </div>
</div>
<script src="admin.js"></script>
</body>
</html>
